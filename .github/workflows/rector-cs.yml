name: Rector + PHP CS Fixer

on:
  workflow_call:
    inputs:
      php:
        description: PHP version to run
        default: 8.5
        required: false
        type: string
      extensions:
        description: List of extensions to PHP
        required: false
        type: string
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string

jobs:
  rector-cs:
    name: PHP ${{ inputs.php }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php }}
          extensions: ${{ inputs.extensions }}
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Install required packages
        if: ${{ inputs.required-packages != '' }}
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run PHP CS Fixer
        run: ./vendor/bin/php-cs-fixer fix

      - name: Run Rector
        run: ./vendor/bin/rector --output-format=github

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Apply PHP CS Fixer and Rector changes (CI)"
          file_pattern: '*.php'
          disable_globbing: true
