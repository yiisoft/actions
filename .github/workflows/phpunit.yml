name: phpunit

on:
  workflow_call:
    inputs:
      coverage:
        description: Generate code coverage report.
        default: pcov
        required: false
        type: string
      composer-command:
        description: Composer command to run.
        default: composer update --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi
        required: false
        type: string
      prefer-lowest:
        description: Whether to prefer the lowest versions of Composer dependencies.
        default: false
        required: false
        type: boolean
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string
      extensions:
        description: List of extensions to PHP.
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration.
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: Operating systems to test, in JSON format.
        default: '["ubuntu-latest","windows-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, in JSON format.
        default: '["8.1","8.2","8.3","8.4"]'
        required: false
        type: string
      phpunitConfig:
        description: PHPUnit configuration file.
        default: phpunit.xml.dist
        required: false
        type: string
      tools:
        description: Tools to test, separated by comma.
        default:
        required: false
        type: string
      codecovVerbose:
        description: Specify whether the Codecov output should be verbose.
        default: false
        required: false
        type: boolean
      codecovFailCiIfError:
        description: Specify whether Codecov upload errors should fail the workflow.
        default: true
        required: false
        type: boolean
    secrets:
      CODECOV_TOKEN:
        description: Codecov upload token
        required: false
      codecovToken:
        description: Deprecated, use CODECOV_TOKEN
        required: false

permissions:
  contents: read

jobs:
  phpunit:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install PHP with extensions.
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          coverage: ${{ inputs.coverage }}
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}
          tools: ${{ inputs.tools }}

      - name: Determine composer cache directory on Linux.
        if: matrix.os == 'ubuntu-latest'
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Determine composer cache directory on Windows.
        if: matrix.os == 'windows-latest'
        run: echo "COMPOSER_CACHE_DIR=~\AppData\Local\Composer" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache dependencies installed with composer.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            php${{ matrix.php }}-composer-

      - name: Install dependencies with Composer
        if: ${{ !inputs.prefer-lowest && runner.os != 'Windows' }}
        run: |
          printf '%s\n' "$INPUTS_COMPOSER_COMMAND" > "$RUNNER_TEMP/composer-command.sh"
          bash -e "$RUNNER_TEMP/composer-command.sh"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - name: Install dependencies with Composer
        if: ${{ !inputs.prefer-lowest && runner.os == 'Windows' }}
        shell: powershell
        run: |
          Set-Content -Path "$env:RUNNER_TEMP\composer-command.ps1" -Value $env:INPUTS_COMPOSER_COMMAND
          & "$env:RUNNER_TEMP\composer-command.ps1"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - name: Install dependencies with Composer (prefer lowest)
        if: ${{ inputs.prefer-lowest && runner.os != 'Windows' }}
        run: |
          printf '%s --prefer-lowest\n' "$INPUTS_COMPOSER_COMMAND" > "$RUNNER_TEMP/composer-command.sh"
          bash -e "$RUNNER_TEMP/composer-command.sh"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - name: Install dependencies with Composer (prefer lowest)
        if: ${{ inputs.prefer-lowest && runner.os == 'Windows' }}
        shell: powershell
        run: |
          Set-Content -Path "$env:RUNNER_TEMP\composer-command.ps1" -Value "$env:INPUTS_COMPOSER_COMMAND --prefer-lowest"
          & "$env:RUNNER_TEMP\composer-command.ps1"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run tests with PHPUnit with code coverage
        if: ${{ runner.os != 'Windows' }}
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --colors=always --configuration "$INPUTS_PHPUNIT_CONFIG"
        env:
          INPUTS_PHPUNIT_CONFIG: ${{ inputs.phpunitConfig }}

      - name: Run tests with PHPUnit with code coverage
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --colors=always --configuration "$env:INPUTS_PHPUNIT_CONFIG"
        env:
          INPUTS_PHPUNIT_CONFIG: ${{ inputs.phpunitConfig }}

      - name: Upload coverage to Codecov.
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN || secrets.codecovToken }}
          files: ./coverage.xml
          verbose: ${{ inputs.codecovVerbose }}
          fail_ci_if_error: ${{ inputs.codecovFailCiIfError }}
