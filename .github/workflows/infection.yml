name: infection

on:
  workflow_call:
    inputs:
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string
      extensions:
        description: List of extensions to PHP
        default:
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: Operating systems to test, in JSON format.
        default: '["ubuntu-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, in JSON format.
        default: '["8.5"]'
        required: false
        type: string
      min-covered-msi:
        description: Minimum MSI to be considered a success.
        default: 0
        required: false
        type: string
      min-msi:
        description: Minimum Mutation Score Indicator.
        default: 0
        required: false
        type: string
      infection-args:
        description: Infection command arguments
        default: --ignore-msi-with-no-mutations --only-covered
        required: false
        type: string

    secrets:
      STRYKER_DASHBOARD_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  infection:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          coverage: xdebug
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run infection
        run: |
          vendor/bin/infection --min-msi="$INPUTS_MIN_MSI" --min-covered-msi="$INPUTS_MIN_COVERED_MSI" $INPUTS_INFECTION_ARGS
        env:
          INPUTS_MIN_MSI: ${{ inputs.min-msi }}
          INPUTS_MIN_COVERED_MSI: ${{ inputs.min-covered-msi }}
          INPUTS_INFECTION_ARGS: ${{ inputs.infection-args }}
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
