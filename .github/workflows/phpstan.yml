name: PHPStan

on:
  workflow_call:
    inputs:
      phpstan-config:
        description: PHPStan configuration file.
        default: phpstan.neon
        required: false
        type: string
      extensions:
        description: List of PHP extensions
        default:
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: OS to test, separated by comma
        required: true
        type: string
      php:
        description: PHP versions to test, separated by comma
        required: true
        type: string

jobs:
  phpstan:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45
        with:
          coverage: xdebug
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --configuration="$INPUTS_PHPSTAN_CONFIG"
        env:
          INPUTS_PHPSTAN_CONFIG: ${{ inputs.phpstan-config }}
