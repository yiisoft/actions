name: bc

on:
  workflow_call:
    inputs:
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string
      usePackageBin:
        description: Use binary installed with Composer and skip installing binary in the action.
        default: false
        type: boolean
      extensions:
        description: List of extensions to PHP.
        default: ''
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration.
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: Operating systems to test, in JSON format.
        default: '["ubuntu-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, in JSON format.
        default: '["8.5"]'
        required: false
        type: string
      tools:
        description: Tools to test, separated by comma.
        default: ''
        required: false
        type: string
      composer-require-options:
        description: Options passed to Composer when installing roave/backward-compatibility-check.
        default: '--with-all-dependencies --no-progress --ansi'
        required: false
        type: string

permissions:
  contents: read

jobs:
  bc:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install PHP with extensions.
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}
          tools: ${{ inputs.tools }}

      - name: Install Composer dependencies
        if: inputs.usePackageBin == true
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - name: Install roave/backward-compatibility-check
        if: inputs.usePackageBin == false
        env:
          COMPOSER_REQUIRE_OPTIONS: ${{ inputs.composer-require-options }}
        shell: bash
        run: |
          read -r -a composer_require_options <<< "${COMPOSER_REQUIRE_OPTIONS}"
          composer require --dev roave/backward-compatibility-check "${composer_require_options[@]}"

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run roave/backward-compatibility-check.
        run: vendor/bin/roave-backward-compatibility-check
