name: phpunit

on:
  workflow_call:
    inputs:
      coverage:
        description: Generate code coverage report.
        default: pcov
        required: false
        type: string
      prefer-lowest:
        description: Whether to prefer the lowest versions of Composer dependencies.
        default: false
        required: false
        type: boolean
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string
      extensions:
        description: List of extensions to PHP.
        required: false
        type: string
      test-extensions:
        description: List of extensions to PHP before running tests.
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration. Use `%GITHUB_WORKSPACE%` as a placeholder for the actual workspace path.
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: Operating systems to test, in JSON format.
        default: '["ubuntu-latest","windows-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, in JSON format.
        default: '["8.1","8.2","8.3","8.4"]'
        required: false
        type: string
      phpunitConfig:
        description: PHPUnit configuration file.
        default: phpunit.xml.dist
        required: false
        type: string
      tools:
        description: Tools to test, separated by comma.
        default:
        required: false
        type: string
      codecovVerbose:
        description: Specify whether the Codecov output should be verbose.
        default: false
        required: false
        type: boolean
    secrets:
      CODECOV_TOKEN:
        description: Codecov upload token
        required: false
      codecovToken:
        description: Deprecated, use CODECOV_TOKEN
        required: false

permissions:
  contents: read

jobs:
  phpunit:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve %GITHUB_WORKSPACE% in ini-values
        id: ini-values
        shell: bash
        run: |
          delimiter="INI_VALUES_EOF_${RANDOM}_$$"
          resolved=${INI_VALUES//%GITHUB_WORKSPACE%/$GITHUB_WORKSPACE}
          {
            printf 'value<<%s\n' "$delimiter"
            printf '%s\n' "$resolved"
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_OUTPUT"
        env:
          INI_VALUES: ${{ inputs.ini-values }}

      - name: Install PHP with extensions.
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          coverage: ${{ inputs.coverage }}
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ steps['ini-values'].outputs.value }}
          php-version: ${{ matrix.php }}
          tools: ${{ inputs.tools }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
        with:
          dependency-versions: ${{ inputs.prefer-lowest && 'lowest' || 'locked' }}

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Configure PHP extensions before tests.
        if: ${{ inputs.test-extensions != '' }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          coverage: ${{ inputs.coverage }}
          extensions: ${{ inputs.test-extensions }}
          ini-values: ${{ steps['ini-values'].outputs.value }}
          php-version: ${{ matrix.php }}
          tools: ${{ inputs.tools }}

      - name: Run tests with PHPUnit with code coverage
        if: ${{ runner.os != 'Windows' }}
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --colors=always --configuration "$INPUTS_PHPUNIT_CONFIG"
        env:
          INPUTS_PHPUNIT_CONFIG: ${{ inputs.phpunitConfig }}

      - name: Run tests with PHPUnit with code coverage
        if: ${{ runner.os == 'Windows' }}
        shell: powershell
        run: vendor/bin/phpunit --coverage-clover=coverage.xml --colors=always --configuration "$env:INPUTS_PHPUNIT_CONFIG"
        env:
          INPUTS_PHPUNIT_CONFIG: ${{ inputs.phpunitConfig }}

      - name: Upload coverage to Codecov.
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN || secrets.codecovToken }}
          files: ./coverage.xml
          verbose: ${{ inputs.codecovVerbose }}
          fail_ci_if_error: true
