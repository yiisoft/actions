name: bc

on:
  workflow_call:
    inputs:
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string
      usePackageBin:
        description: Use binary installed with Composer and skip installing binary in the action.
        default: false
        type: boolean
      extensions:
        description: List of extensions to PHP.
        default: ''
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration.
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: Operating systems to test, in JSON format.
        default: '["ubuntu-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, in JSON format.
        default: '["8.5"]'
        required: false
        type: string
      tools:
        description: Tools to test, separated by comma.
        default: ''
        required: false
        type: string

permissions:
  contents: read

jobs:
  bc:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install PHP with extensions.
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}
          tools: ${{ inputs.tools }}

      - name: Install Composer dependencies
        if: inputs.usePackageBin == true
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6

      - name: Install roave/backward-compatibility-check
        if: inputs.usePackageBin == false
        run: composer require --dev roave/backward-compatibility-check --with-all-dependencies --no-progress --ansi

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run roave/backward-compatibility-check.
        run: vendor/bin/roave-backward-compatibility-check
