name: rector

on:
  workflow_call:
    inputs:
      required-packages:
        description: List of required packages to install, for example '["db", "db-sqlite"]'
        default: ''
        required: false
        type: string
      download-config:
        description: Download Rector configuration file
        default: false
        required: false
        type: boolean
      os:
        description: OS to test, separated by comma
        default: '["ubuntu-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, separated by comma
        default: '["8.5"]'
        required: false
        type: string
      extensions:
        description: List of extensions to PHP
        required: false
        type: string
      repository:
        type: string
        required: false
    secrets:
      token:
        description: GitHub classic token with repo and workflow scopes
        required: false

permissions:
  contents: read

jobs:
  rector:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Required to push Rector changes back to the branch.

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.token || github.token }}
          ref: ${{ github.head_ref }}
          repository: ${{ inputs.repository || github.event.pull_request.head.repo.full_name || github.repository }}
          persist-credentials: false

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ inputs.extensions }}
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Download rector config
        if: ${{ inputs.download-config == true}}
        shell: bash
        run: |
          wget https://raw.githubusercontent.com/yiisoft/actions/main/config/rector.php -O rector.php

      - run: vendor/bin/rector process --ansi --output-format=github

      - name: Configure Git credentials
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: git config --global credential.helper '!f() { echo username=x-access-token; echo password=$GH_TOKEN; }; f'

      - name: Commit changes
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- '*.php'
          git diff --cached --quiet || (
            git commit -m "Apply Rector changes (CI)"
            git push
          )
