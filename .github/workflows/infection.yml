name: infection

on:
  workflow_call:
    inputs:
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string
      extensions:
        description: List of extensions to PHP
        default:
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: Operating systems to test, in JSON format.
        default: '["ubuntu-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, in JSON format.
        default: '["8.5"]'
        required: false
        type: string
      infection-args:
        description: Infection command arguments
        default: --ignore-msi-with-no-mutations --only-covered
        required: false
        type: string

    secrets:
      STRYKER_DASHBOARD_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  infection:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45
        with:
          coverage: xdebug
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run infection
        run: |
          vendor/bin/infection $INPUTS_INFECTION_ARGS
        env:
          INPUTS_INFECTION_ARGS: ${{ inputs.infection-args }}
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
