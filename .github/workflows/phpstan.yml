name: PHPStan

on:
  workflow_call:
    inputs:
      phpstan-config:
        description: PHPStan configuration file.
        default: phpstan.neon
        required: false
        type: string
      extensions:
        description: List of PHP extensions
        default:
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: OS to test, separated by comma
        required: true
        type: string
      php:
        description: PHP versions to test, separated by comma
        required: true
        type: string

permissions:
  contents: read

jobs:
  phpstan:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          coverage: xdebug
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --configuration="$INPUTS_PHPSTAN_CONFIG"
        env:
          INPUTS_PHPSTAN_CONFIG: ${{ inputs.phpstan-config }}
