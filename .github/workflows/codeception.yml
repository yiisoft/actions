name: codeception

on:
  workflow_call:
    inputs:
      codeception-command:
        description: Codeception command to run.
        default: vendor/bin/codecept run --coverage-xml
        required: false
        type: string
      coverage:
        description: Generate code coverage report.
        default: pcov
        required: false
        type: string
      composer-command:
        description: Composer command to run.
        default: composer update --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi
        required: false
        type: string
      debug:
        description: Debug mode.
        default: false
        required: false
        type: boolean
      extensions:
        description: List of PHP extensions to install.
        default:
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration.
        default: date.timezone='UTC'
        required: false
        type: string
      os:
        description: OS to test, separated by comma.
        required: true
        type: string
      php:
        description: PHP versions to test, separated by comma.
        required: true
        type: string
      tools:
        description: Tools to install, separated by comma.
        default:
        required: false
        type: string
      codecovVerbose:
        description: Specify whether the Codecov output should be verbose.
        default: false
        required: false
        type: boolean
    secrets:
      CODECOV_TOKEN:
        description: Codecov upload token
        required: false
      codecovToken:
        description: Deprecated, use CODECOV_TOKEN
        required: false

jobs:
  codeception:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    env:
      key: cache-v1
      YII_C3: true

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install PHP with extensions.
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45
        with:
          coverage: ${{ inputs.coverage }}
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}
          tools: ${{ inputs.tools }}

      - name: Determine composer cache directory on Linux.
        if: matrix.os == 'ubuntu-latest'
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Determine composer cache directory on Windows.
        if: matrix.os == 'windows-latest'
        run: echo "COMPOSER_CACHE_DIR=~\AppData\Local\Composer" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache dependencies installed with composer.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            php${{ matrix.php }}-composer-

      - name: Update composer.
        run: composer self-update

      - name: Install dependencies with composer.
        if: runner.os != 'Windows'
        run: |
          printf '%s\n' "$INPUTS_COMPOSER_COMMAND" > "$RUNNER_TEMP/composer-command.sh"
          bash -e "$RUNNER_TEMP/composer-command.sh"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - name: Install dependencies with composer.
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-Content -Path "$env:RUNNER_TEMP\composer-command.ps1" -Value $env:INPUTS_COMPOSER_COMMAND
          & "$env:RUNNER_TEMP\composer-command.ps1"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - name: Run tests with codeception with code coverage with shell bash.
        if: matrix.os == 'ubuntu-latest'
        continue-on-error:  ${{ inputs.debug }}
        run: |
          printf '%s\n' "$INPUTS_CODECEPTION_COMMAND" > "$RUNNER_TEMP/codeception-command.sh"
          bash -e "$RUNNER_TEMP/codeception-command.sh"
        env:
          INPUTS_CODECEPTION_COMMAND: ${{ inputs.codeception-command }}

      - name: Run tests with codeception with code coverage with shell powershell.
        if: matrix.os == 'windows-latest'
        continue-on-error:  ${{ inputs.debug }}
        run: |
          Set-Content -Path "$env:RUNNER_TEMP\codeception-command.ps1" -Value $env:INPUTS_CODECEPTION_COMMAND
          & "$env:RUNNER_TEMP\codeception-command.ps1"
        shell: powershell
        env:
          INPUTS_CODECEPTION_COMMAND: ${{ inputs.codeception-command }}

      - name: Upload coverage to Codecov.
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.1' && inputs.debug == false
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          token: ${{ secrets.CODECOV_TOKEN || secrets.codecovToken }}
          files: tests/_output/coverage.xml
          verbose: ${{ inputs.codecovVerbose }}

      - name: Archive codeception results.
        if: ${{ inputs.debug }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: output
          path: ./runtime/tests/_output

      - name: Download all workflow run artifacts.
        if: ${{ inputs.debug }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
