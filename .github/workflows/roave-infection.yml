name: roave-infection

on:
  workflow_call:
    inputs:
      composer-command:
        description: Composer command to run.
        default: composer update --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi
        required: false
        type: string
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string
      bin-name:
        description: Binary name
        default: roave-infection-static-analysis-plugin
        required: false
        type: string
      extensions:
        description: List of extensions to PHP.
        default:
        required: false
        type: string
      ini-values:
        description: Initial values for PHP configuration.
        default: date.timezone='UTC'
        required: false
        type: string
      min-covered-msi:
        description: Minimum MSI to be considered a success.
        default: 0
        required: false
        type: string
      min-msi:
        description: Minimum Mutation Score Indicator.
        default: 0
        required: false
        type: string
      threads:
        description: Number of threads to use for mutation testing. Can be a number or "max".
        default: 'max'
        required: false
        type: string
      os:
        description: Operating systems to test, in JSON format.
        default: '["ubuntu-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, in JSON format.
        default: '["8.5"]'
        required: false
        type: string

    secrets:
      STRYKER_DASHBOARD_API_KEY:
        required: true

jobs:
  roave-infection:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install PHP with extensions.
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45
        with:
          coverage: pcov
          extensions: ${{ inputs.extensions }}
          ini-values: ${{ inputs.ini-values }}
          php-version: ${{ matrix.php }}

      - name: Determine composer cache directory on Linux.
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer.
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            php${{ matrix.php }}-composer

      - name: Install dependencies with composer.
        if: runner.os != 'Windows'
        run: |
          printf '%s\n' "$INPUTS_COMPOSER_COMMAND" > "$RUNNER_TEMP/composer-command.sh"
          bash -e "$RUNNER_TEMP/composer-command.sh"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - name: Install dependencies with composer.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Content -Path "$env:RUNNER_TEMP\composer-command.ps1" -Value $env:INPUTS_COMPOSER_COMMAND
          & "$env:RUNNER_TEMP\composer-command.ps1"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run roave infection.
        run: |
          "vendor/bin/$INPUTS_BIN_NAME" --threads="$INPUTS_THREADS" --min-msi="$INPUTS_MIN_MSI" --min-covered-msi="$INPUTS_MIN_COVERED_MSI" --ignore-msi-with-no-mutations
        env:
          INPUTS_BIN_NAME: ${{ inputs.bin-name }}
          INPUTS_THREADS: ${{ inputs.threads }}
          INPUTS_MIN_MSI: ${{ inputs.min-msi }}
          INPUTS_MIN_COVERED_MSI: ${{ inputs.min-covered-msi }}
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
