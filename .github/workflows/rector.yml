name: rector

on:
  workflow_call:
    inputs:
      composer-command:
        description: Composer command to run
        default: composer update --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi
        required: false
        type: string
      required-packages:
        description: List of required packages to install, for example '["db", "db-sqlite"]'
        default: ''
        required: false
        type: string
      download-config:
        description: Download Rector configuration file
        default: false
        required: false
        type: boolean
      os:
        description: OS to test, separated by comma
        default: '["ubuntu-latest"]'
        required: false
        type: string
      php:
        description: PHP versions to test, separated by comma
        default: '["8.5"]'
        required: false
        type: string
      extensions:
        description: List of extensions to PHP
        required: false
        type: string
      repository:
        type: string
        required: false
    secrets:
      token:
        description: GitHub classic token with repo and workflow scopes
        required: false

permissions:
  contents: read

jobs:
  rector:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Required to push Rector changes back to the branch.

    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
        php: ${{ fromJson(inputs.php) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          token: ${{ secrets.token || github.token }}
          ref: ${{ github.head_ref }}
          repository: ${{ inputs.repository || github.event.pull_request.head.repo.full_name || github.repository }}
          persist-credentials: false

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ inputs.extensions }}
          coverage: none

      - name: Determine composer cache directory on Linux
        run: echo "COMPOSER_CACHE_DIR=$(composer config cache-dir)" >> $GITHUB_ENV

      - name: Cache dependencies installed with composer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ env.COMPOSER_CACHE_DIR }}
          key: php${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            php${{ matrix.php }}-composer-

      - name: Install dependencies with composer
        if: runner.os != 'Windows'
        run: |
          printf '%s\n' "$INPUTS_COMPOSER_COMMAND" > "$RUNNER_TEMP/composer-command.sh"
          bash -e "$RUNNER_TEMP/composer-command.sh"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - name: Install dependencies with composer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Content -Path "$env:RUNNER_TEMP\composer-command.ps1" -Value $env:INPUTS_COMPOSER_COMMAND
          & "$env:RUNNER_TEMP\composer-command.ps1"
        env:
          INPUTS_COMPOSER_COMMAND: ${{ inputs.composer-command }}

      - if: ${{ inputs.required-packages != '' }}
        name: Install required packages.
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Download rector config
        if: ${{ inputs.download-config == true}}
        shell: bash
        run: |
          wget https://raw.githubusercontent.com/yiisoft/actions/main/config/rector.php -O rector.php

      - run: vendor/bin/rector process --ansi --output-format=github

      - name: Configure Git credentials
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: git config --global credential.helper '!f() { echo username=x-access-token; echo password=$GH_TOKEN; }; f'

      - name: Commit changes
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- '*.php'
          git diff --cached --quiet || (
            git commit -m "Apply Rector changes (CI)"
            git push
          )
