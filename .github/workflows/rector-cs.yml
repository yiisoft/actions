name: Rector + PHP CS Fixer

on:
  workflow_call:
    inputs:
      php:
        description: PHP version to run
        default: 8.5
        required: false
        type: string
      extensions:
        description: List of extensions to PHP
        required: false
        type: string
      required-packages:
        description: List of required packages to install, in JSON format. For example '["db", "db-sqlite"]'.
        default: ''
        required: false
        type: string

permissions:
  contents: read

jobs:
  rector-cs:
    name: PHP ${{ inputs.php }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push PHP CS Fixer and Rector changes back to the branch.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.php }}
          extensions: ${{ inputs.extensions }}
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0

      - name: Install required packages
        if: ${{ inputs.required-packages != '' }}
        uses: yiisoft/actions/install-packages@master
        with:
          packages: ${{ inputs.required-packages }}

      - name: Run PHP CS Fixer
        run: ./vendor/bin/php-cs-fixer fix

      - name: Run Rector
        run: ./vendor/bin/rector --output-format=github

      - name: Commit changes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper '!f() { echo username=x-access-token; echo password=$GITHUB_TOKEN; }; f'
          git add '*.php'
          git diff --staged --quiet || git commit -m "Apply PHP CS Fixer and Rector changes (CI)"
          git push origin "HEAD:${HEAD_REF}"
